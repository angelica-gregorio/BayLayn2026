<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayLayn 2026 Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link rel="icon" href="logo.jpg">
</head>
<body>
    <header>
        <img src="logo.jpg" class="org-logo">
        <h2>BayLayn 2026</h2>
        <p class="subtitle">Para sa Bayan at Lasalyano</p>
    </header>

    <div class="scanner-card">
        <div id="reader"></div>
        
        <div class="manual-entry">
            <input type="text" id="manualInput" placeholder="Enter ID (e.g. 001)">
            <button class="btn-manual" onclick="manualCheck()">Go</button>
        </div>
    </div>

    <!-- Modal Popup -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <button class="modal-dismiss-btn" onclick="closeModal()">Dismiss</button>
        </div>
    </div>

    <script>
    // --- CONFIGURATION ---
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbxQnjRwMhwdGxRnqJW9ogF3STfVT3MhPhn1G8fwsV6_HcST_IbYQj-QB9hlE99LPz1Akg/exec";

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d, t) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = t;
        o.frequency.value = f;
        o.connect(g);
        g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime); 
        o.start();
        setTimeout(() => o.stop(), d);
    }
    function playSuccess() { 
        beep(1000, 80, 'sine'); 
        setTimeout(() => beep(1500, 80, 'sine'), 80); 
    }
    function playError() { 
        beep(300, 300, 'sawtooth'); 
    }

    const scanCache = new Map();
    const CACHE_DURATION = 3000; 

    const manualInput = document.getElementById('manualInput');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBox = document.getElementById('modalBox');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');

    let scannerPausedByModal = false;

    function showModal(cls, title, bodyHtml) {
        modalBox.className = 'modal-box ' + cls;
        modalTitle.textContent = title;
        modalBody.innerHTML = bodyHtml;
        modalOverlay.classList.add('active');
        scannerPausedByModal = true;

        if (navigator.vibrate) {
            navigator.vibrate(cls === 'status-success' ? 50 : [40, 30, 40]);
        }
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
        manualInput.value = "";
        scannerPausedByModal = false;

        // Resume scanner if it was paused
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
            html5QrcodeScanner.resume();
        }
    }

    function processID(id) {
        if (!id) return;
        
        id = id.trim().toUpperCase();
        
        const cached = scanCache.get(id);
        if (cached && Date.now() - cached.time < CACHE_DURATION) {
            showModal('status-warning', 'DUPLICATE SCAN', 'Wait 3 seconds before scanning again.');
            playError();
            return;
        }
        
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
            html5QrcodeScanner.pause();
        }
        
        showModal('status-info', 'SCANNING...', `<span style="opacity:0.7">${id}</span>`);
        playSuccess(); 
        
        scanCache.set(id, { time: Date.now() });
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000); 
        
        fetch(`${googleScriptUrl}?id=${id}`, { 
            signal: controller.signal,
            cache: 'no-store',
            redirect: 'follow' 
        })
        .then(res => {
            clearTimeout(timeoutId);
            return res.json(); 
        })
        .then(data => {
            scanCache.set(id, { time: Date.now(), result: data });
            
            let studentListHtml = "";
            if (data.students && data.students.length > 0) {
                studentListHtml = `<ul class="modal-students">`;
                data.students.forEach(student => {
                    studentListHtml += `<li><strong>${student.name}</strong> <span>(${student.category})</span></li>`;
                });
                studentListHtml += `</ul>`;
            }

            if (data.status === "success") {
                showModal('status-success', '✓ GRANTED', `<strong>${data.schoolName}</strong><br>Timed in successfully.${studentListHtml}`);
            } else if (data.status === "notice") {
                showModal('status-warning', '⚠ ALREADY INSIDE', `<strong>${data.schoolName}</strong><br>Delegates already checked in.${studentListHtml}`);
            } else {
                showModal('status-error', '✗ DENIED', data.message || "School not found.");
                playError();
            }
        })
        .catch(err => {
            clearTimeout(timeoutId);
            scanCache.delete(id); 
            
            if (err.name === 'AbortError') {
                showModal('status-error', 'TIMEOUT', 'Server too slow. Try again.');
            } else {
                showModal('status-error', 'ERROR', 'Network fail or Invalid JSON.');
                console.error(err);
            }
            playError();
        });
    }

    function manualCheck() {
        const id = manualInput.value.trim();
        if (id) processID(id);
    }

    function onScanSuccess(decodedText) {
        // Don't scan while modal is open
        if (scannerPausedByModal) return;
        processID(decodedText);
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", {
        fps: 30, 
        qrbox: { width: 250, height: 250 },
        formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
        videoConstraints: { 
            facingMode: "environment",
            aspectRatio: 1.0 
        },
        rememberLastUsedCamera: true 
    });

    html5QrcodeScanner.render(onScanSuccess);

    setInterval(() => {
        const now = Date.now();
        for (const [id, data] of scanCache.entries()) {
            if (now - data.time > CACHE_DURATION) {
                scanCache.delete(id);
            }
        }
    }, 5000);
    </script>
</body>
</html>
