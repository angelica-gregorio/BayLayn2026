<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayLayn 2026 Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">

    <link rel="icon" href="620015681_1359190809576072_1351761344962927935_n.jpg">

</head>
<body>
    <header>
        <img src="https://scontent.fmnl10-1.fna.fbcdn.net/v/t39.30808-6/620015681_1359190809576072_1351761344962927935_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeFrkOg7rquErGiYsDvvO2UKCXjqDMRZ41AJeOoMxFnjUMJUqircGwEdLFsxcT2161L23oe5XRP7cs5LCnqDqcgG&_nc_ohc=9DW4qBVU2WsQ7kNvwF1tBz1&_nc_oc=Admzaxdz4s2h8ggq9jZw_TrHQN5NB0BsG0mj3iCnELg4td5T70T0U4p6uSaDMOdW-yQ&_nc_zt=23&_nc_ht=scontent.fmnl10-1.fna&_nc_gid=_-FjasMg4AfKMtZywVaBCQ&oh=00_Afs7VVTcKVuL1S3AwHybIIFZXyyS0YYo5vnWzZZLT0yc2w&oe=69863D1F" class="org-logo">
        <h2>BayLayn 2026</h2>
        <p class="subtitle">Para sa Bayan at Lasalyano</p>
    </header>

    <div class="scanner-card">
        <div id="reader"></div>
        
        <div class="manual-entry">
            <input type="text" id="manualInput" placeholder="Enter ID (e.g. 001)">
            <button class="btn-manual" onclick="manualCheck()">Go</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
     // --- CONFIGURATION ---
const googleScriptUrl = "https://script.google.com/macros/s/AKfycbwKzXF9bI4044LjTBzaVgQSy1bLQToqKF-7yZCOjbSToALdNRkj9JDj13p-6Rtgai3Y/exec";

// AUDIO SYSTEM (Pre-initialized)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(f, d, t) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = t;
    o.frequency.value = f;
    o.connect(g);
    g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.3, audioCtx.currentTime); // Volume control
    o.start();
    setTimeout(() => o.stop(), d);
}
function playSuccess() { 
    beep(1000, 80, 'sine'); 
    setTimeout(() => beep(1500, 80, 'sine'), 80); 
}
function playError() { 
    beep(300, 300, 'sawtooth'); 
}

// CACHE SYSTEM (Prevents duplicate scans)
const scanCache = new Map();
const CACHE_DURATION = 3000; // 3 seconds

// DOM CACHE (Avoid repeated querySelector calls)
const resultDiv = document.getElementById('result');
const manualInput = document.getElementById('manualInput');

// OPTIMIZED PROCESSOR
function processID(id) {
    if (!id) return;
    
    // Normalize ID
    id = id.trim().toUpperCase();
    
    // Check cache first (instant response)
    const cached = scanCache.get(id);
    if (cached && Date.now() - cached.time < CACHE_DURATION) {
        showResult('status-warning', 'DUPLICATE SCAN', 'Wait 3 seconds');
        playError();
        quickResume();
        return;
    }
    
    // Pause scanner
    if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
        html5QrcodeScanner.pause();
    }
    
    // Instant feedback (before network request)
    showResult('status-info', 'SCANNING', id);
    playSuccess(); // Play sound immediately
    
    // Add to cache immediately
    scanCache.set(id, { time: Date.now() });
    
    // Network request with timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 sec timeout
    
    fetch(`${googleScriptUrl}?id=${id}`, { 
        signal: controller.signal,
        cache: 'no-store' // Prevent browser caching
    })
    .then(res => {
        clearTimeout(timeoutId);
        return res.text();
    })
    .then(data => {
        // Update cache with result
        scanCache.set(id, { time: Date.now(), result: data });
        
        // Ultra-fast response parsing
        if (data.includes("WELCOME")) {
            showResult('status-success', '✓ GRANTED', data.replace("✅ WELCOME: ", ""));
        } else if (data.includes("ALREADY")) {
            showResult('status-warning', '⚠ DUPLICATE', "Already Inside");
        } else {
            showResult('status-error', '✗ DENIED', "Not Found");
        }
        
        quickResume();
    })
    .catch(err => {
        clearTimeout(timeoutId);
        scanCache.delete(id); // Remove from cache on error
        
        if (err.name === 'AbortError') {
            showResult('status-error', 'TIMEOUT', 'Server too slow');
        } else {
            showResult('status-error', 'ERROR', 'Network fail');
        }
        playError();
        quickResume(800);
    });
}

// FAST RESUME FUNCTION
function quickResume(delay = 1200) {
    setTimeout(() => {
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
            html5QrcodeScanner.resume();
        }
        resultDiv.style.display = 'none';
        manualInput.value = "";
    }, delay);
}

// OPTIMIZED RESULT DISPLAY
function showResult(cls, title, msg) {
    resultDiv.className = cls;
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `<div style="font-size:0.75rem;opacity:0.85;text-transform:uppercase;font-weight:700;margin-bottom:4px">${title}</div><div class="result-body">${msg}</div>`;
    
    // Haptic feedback
    if (navigator.vibrate) {
        navigator.vibrate(cls === 'status-success' ? 50 : [40, 30, 40]);
    }
}

// MANUAL CHECK
function manualCheck() {
    const id = manualInput.value.trim();
    if (id) processID(id);
}

// QR SCAN HANDLER
function onScanSuccess(decodedText) {
    processID(decodedText);
}

// SCANNER INITIALIZATION (Optimized settings)
const html5QrcodeScanner = new Html5QrcodeScanner("reader", {
    fps: 30, // Increased from 20 for faster detection
    qrbox: { width: 250, height: 250 },
    formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
    videoConstraints: { 
        facingMode: "environment",
        aspectRatio: 1.0 // Better for QR codes
    },
    rememberLastUsedCamera: true // Faster on repeat use
});

html5QrcodeScanner.render(onScanSuccess);

// CLEANUP CACHE PERIODICALLY
setInterval(() => {
    const now = Date.now();
    for (const [id, data] of scanCache.entries()) {
        if (now - data.time > CACHE_DURATION) {
            scanCache.delete(id);
        }
    }
}, 5000);
    </script>
</body>
</html>
