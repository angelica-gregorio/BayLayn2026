<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayLayn 2026 Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link rel="icon" href="620015681_1359190809576072_1351761344962927935_n.jpg">
</head>
<body>
    <header>
        <img src="https://scontent.fmnl10-1.fna.fbcdn.net/v/t39.30808-6/620015681_1359190809576072_1351761344962927935_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeFrkOg7rquErGiYsDvvO2UKCXjqDMRZ41AJeOoMxFnjUMJUqircGwEdLFsxcT2161L23oe5XRP7cs5LCnqDqcgG&_nc_ohc=9DW4qBVU2WsQ7kNvwF1tBz1&_nc_oc=Admzaxdz4s2h8ggq9jZw_TrHQN5NB0BsG0mj3iCnELg4td5T70T0U4p6uSaDMOdW-yQ&_nc_zt=23&_nc_ht=scontent.fmnl10-1.fna&_nc_gid=_-FjasMg4AfKMtZywVaBCQ&oh=00_Afs7VVTcKVuL1S3AwHybIIFZXyyS0YYo5vnWzZZLT0yc2w&oe=69863D1F" class="org-logo">
        <h2>BayLayn 2026</h2>
        <p class="subtitle">Para sa Bayan at Lasalyano</p>
    </header>

    <div class="scanner-card">
        <div id="reader"></div>
        
        <div class="manual-entry">
            <input type="text" id="manualInput" placeholder="Enter ID (e.g. 001)">
            <button class="btn-manual" onclick="manualCheck()">Go</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
    // --- CONFIGURATION ---
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbxQnjRwMhwdGxRnqJW9ogF3STfVT3MhPhn1G8fwsV6_HcST_IbYQj-QB9hlE99LPz1Akg/exec";

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d, t) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = t;
        o.frequency.value = f;
        o.connect(g);
        g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime); 
        o.start();
        setTimeout(() => o.stop(), d);
    }
    function playSuccess() { 
        beep(1000, 80, 'sine'); 
        setTimeout(() => beep(1500, 80, 'sine'), 80); 
    }
    function playError() { 
        beep(300, 300, 'sawtooth'); 
    }

    const scanCache = new Map();
    const CACHE_DURATION = 3000; 

    const resultDiv = document.getElementById('result');
    const manualInput = document.getElementById('manualInput');

    function processID(id) {
        if (!id) return;
        
        id = id.trim().toUpperCase();
        
        const cached = scanCache.get(id);
        if (cached && Date.now() - cached.time < CACHE_DURATION) {
            showResult('status-warning', 'DUPLICATE SCAN', 'Wait 3 seconds');
            playError();
            quickResume(1500);
            return;
        }
        
        if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.SCANNING) {
            html5QrcodeScanner.pause();
        }
        
        showResult('status-info', 'SCANNING', id);
        playSuccess(); 
        
        scanCache.set(id, { time: Date.now() });
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000); 
        
        // ADDED redirect: 'follow' here properly formatted
        fetch(`${googleScriptUrl}?id=${id}`, { 
            signal: controller.signal,
            cache: 'no-store',
            redirect: 'follow' 
        })
        .then(res => {
            clearTimeout(timeoutId);
            return res.json(); 
        })
        .then(data => {
            scanCache.set(id, { time: Date.now(), result: data });
            
            let studentListHtml = "";
            if (data.students && data.students.length > 0) {
                studentListHtml = `<ul style="text-align: left; margin-top: 10px; padding-left: 20px; font-size: 0.85rem; max-height: 150px; overflow-y: auto;">`;
                data.students.forEach(student => {
                    studentListHtml += `<li style="margin-bottom: 4px;"><strong>${student.name}</strong> <span style="font-size: 0.75rem; opacity: 0.8;">(${student.category})</span></li>`;
                });
                studentListHtml += `</ul>`;
            }

            if (data.status === "success") {
                showResult('status-success', '✓ GRANTED', `<strong>${data.schoolName}</strong><br>Timed in successfully.<br>${studentListHtml}`);
                quickResume(5000); 
            } else if (data.status === "notice") {
                showResult('status-warning', '⚠ ALREADY INSIDE', `<strong>${data.schoolName}</strong><br>Delegates already checked in.<br>${studentListHtml}`);
                quickResume(5000); 
            } else {
                showResult('status-error', '✗ DENIED', data.message || "School not found.");
                quickResume(2000); 
            }
        })
        .catch(err => {
            clearTimeout(timeoutId);
            scanCache.delete(id); 
            
            if (err.name === 'AbortError') {
                showResult('status-error', 'TIMEOUT', 'Server too slow');
            } else {
                showResult('status-error', 'ERROR', 'Network fail or Invalid JSON');
                console.error(err);
            }
            playError();
            quickResume(1500);
        });
    }

    function quickResume(delay = 1200) {
        setTimeout(() => {
            if (html5QrcodeScanner.getState() === Html5QrcodeScannerState.PAUSED) {
                html5QrcodeScanner.resume();
            }
            resultDiv.style.display = 'none';
            manualInput.value = "";
        }, delay);
    }

    function showResult(cls, title, msg) {
        resultDiv.className = cls;
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `<div style="font-size:0.75rem;opacity:0.85;text-transform:uppercase;font-weight:700;margin-bottom:4px">${title}</div><div class="result-body">${msg}</div>`;
        
        if (navigator.vibrate) {
            navigator.vibrate(cls === 'status-success' ? 50 : [40, 30, 40]);
        }
    }

    function manualCheck() {
        const id = manualInput.value.trim();
        if (id) processID(id);
    }

    function onScanSuccess(decodedText) {
        processID(decodedText);
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", {
        fps: 30, 
        qrbox: { width: 250, height: 250 },
        formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
        videoConstraints: { 
            facingMode: "environment",
            aspectRatio: 1.0 
        },
        rememberLastUsedCamera: true 
    });

    html5QrcodeScanner.render(onScanSuccess);

    setInterval(() => {
        const now = Date.now();
        for (const [id, data] of scanCache.entries()) {
            if (now - data.time > CACHE_DURATION) {
                scanCache.delete(id);
            }
        }
    }, 5000);
    </script>
</body>
</html>
